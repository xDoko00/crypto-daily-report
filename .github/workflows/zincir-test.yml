name: Zincir Testi

# GECICI TEST: GITHUB_TOKEN ile workflow_dispatch atilabiliyor mu?
# depth=1 ile elle tetiklenir; kendisini depth=2 ile tekrar tetiklemeyi dener.
# depth=2 kosusu GORUNURSE zincir mumkun demektir.
on:
  workflow_dispatch:
    inputs:
      depth:
        description: "Zincir derinligi"
        type: string
        default: "1"

jobs:
  zincir:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Derinligi yaz
        run: echo "SU ANKI DERINLIK = ${{ inputs.depth }}"

      - name: Kendini tekrar tetiklemeyi dene (GITHUB_TOKEN ile)
        if: ${{ inputs.depth == '1' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "GITHUB_TOKEN ile dispatch deneniyor..."
          KOD=$(curl -s -o /tmp/cevap.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/zincir-test.yml/dispatches" \
            -d '{"ref":"main","inputs":{"depth":"2"}}')
          echo "HTTP KODU = $KOD"
          echo "--- cevap govdesi ---"
          cat /tmp/cevap.txt
          echo "---------------------"
          if [ "$KOD" = "204" ]; then
            echo "API ISTEGI KABUL EDILDI. Simdi depth=2 kosusu OLUSTU MU ona bakilacak."
          else
            echo "API ISTEGI REDDEDILDI (kod $KOD)."
          fi

      - name: Zincirin ikinci halkasi
        if: ${{ inputs.depth == '2' }}
        run: |
          echo "BASARILI - GITHUB_TOKEN ile tetiklenen kosu CALISTI. Zincir mumkun."
