name: Günlük Kripto Raporu

# Her sabah ~08:00 TSİ otomatik çalışır + manuel tetikleme mümkün.
# Not: GitHub zamanlanmış görevleri "en iyi çaba"dır; tam saat başı (:00) yoğunluğunda
# gecikir/atlanabilir. Bu yüzden 04:55 UTC (yuvarlak olmayan dakika) seçildi ki rapor ~08:00'de gelsin.
on:
  schedule:
    - cron: "55 4 * * *"       # 04:55 UTC ≈ 07:55 TSİ (GitHub gecikmesiyle ~08:00)
  workflow_dispatch:            # GitHub arayüzünden elle çalıştırma
    inputs:
      mode:
        description: "Gönderim modu: normal (kanal) / test (admin) / both (ikisi)"
        type: choice
        options:
          - normal
          - test
          - both
        default: normal

# Aynı anda tek çalışma yeter; üst üste binmeyi engelle.
concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  rapor:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Node.js kur (Claude Code CLI için)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Python bağımlılıklarını kur
        run: pip install -r requirements.txt

      - name: Claude Code CLI kur
        run: npm install -g @anthropic-ai/claude-code

      - name: Raporu üret ve gönder
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          TELEGRAM_BOT_TOKEN:      ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:        ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID:  ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
        # Manuel çalıştırmada "test" kutusu işaretliyse --test bayrağını ekle.
        run: |
          case "${{ inputs.mode }}" in
            test) python report.py --test ;;
            both) python report.py --both ;;
            *)    python report.py ;;
          esac
